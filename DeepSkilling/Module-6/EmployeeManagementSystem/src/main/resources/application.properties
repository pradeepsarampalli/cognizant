# =========================================================================
# Exercise 1 - Configuring Application Properties (H2 database connection)
# =========================================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================================================
# Exercise 10 - Hibernate-Specific Features: batch processing
# =========================================================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# =========================================================================
# Exercise 9 - Customizing Data Source Configuration
# -------------------------------------------------------------------------
# Spring Boot auto-configures a DataSource from the properties above.
# To manage multiple data sources, externalize each one under its own
# prefix and wire up separate @Configuration classes, e.g.:
