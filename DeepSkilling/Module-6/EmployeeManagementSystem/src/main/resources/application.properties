# app.datasource.primary.username=sa
# app.datasource.primary.password=password
#
# app.datasource.secondary.url=jdbc:h2:mem:secondarydb
# app.datasource.secondary.username=sa
# app.datasource.secondary.password=password
#
# Each would be bound with @ConfigurationProperties and exposed as a
# distinct @Bean DataSource / EntityManagerFactory / TransactionManager,
