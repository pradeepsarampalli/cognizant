# =========================================================================
# Spring Framework and application log (Hands on 1)
# =========================================================================
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output parameters
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# =========================================================================
# Database configuration
# -------------------------------------------------------------------------
# The original hands-on uses MySQL (schema "ormlearn"). To make this
# project runnable without any external database installed, it is wired
# to an H2 in-memory database that behaves the same way for every
# Query Method / HQL / JPQL / Criteria Query example in this project.
#
# To run against MySQL instead (as described in the hand-on document):
#   1. Uncomment the MySQL block below and comment out the H2 block.
#   2. mysql> create schema ormlearn;
#   3. mvn clean package (mysql-connector-j is already a dependency)
# =========================================================================
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
# spring.datasource.username=root
# spring.datasource.password=root

# Hibernate configuration
# create-drop lets schema.sql/data.sql seed the in-memory DB on every run.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 web console (optional, handy for browsing the seeded data)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
