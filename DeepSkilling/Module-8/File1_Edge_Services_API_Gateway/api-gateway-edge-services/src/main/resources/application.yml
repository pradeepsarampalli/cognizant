server:
  port: 9090

spring:
  application:
    name: api-gateway-edge-services
  cloud:
    gateway:
      routes:
        # Exercise 1: basic routing to an external example service, with logging filter applied globally
        - id: example_route
          uri: http://example.org
          predicates:
            - Path=/example/**

        # Exercise 2: load-balanced route to a Eureka-registered service (lb:// scheme)
        - id: load_balanced_route
          uri: lb://EXAMPLE-SERVICE
          predicates:
            - Path=/loadbalanced/**

        # Exercise 3: route protected by a Resilience4j circuit breaker with a fallback
        - id: resilient_route
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/resilient/**
          filters:
            - name: CircuitBreaker
              args:
                name: exampleCircuitBreaker
                fallbackUri: forward:/fallback

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

resilience4j:
  circuitbreaker:
    instances:
      exampleCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,circuitbreakers
