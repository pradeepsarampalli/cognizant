server:
  port: 9091

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      # Caching: built-in local response cache, applied per-route below
      routes:
        - id: customer_service_route
          uri: lb://customer-service
          predicates:
            - Path=/customers/**
          filters:
            # Path rewriting: /customers/42 -> /api/v1/customers/42
            - RewritePath=/customers/(?<segment>.*), /api/v1/customers/${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: LocalResponseCache
              args:
                timeToLive: 30s
                size: 10MB

        - id: billing_service_route
          uri: lb://billing-service
          predicates:
            - Path=/billing/**
          filters:
            # Path rewriting: /billing/42 -> /api/v1/billing/42
            - RewritePath=/billing/(?<segment>.*), /api/v1/billing/${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - name: LocalResponseCache
              args:
                timeToLive: 30s
                size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
