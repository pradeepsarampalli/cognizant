server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Direct URL used here for simplicity; in File3/File4-part2 this is
# resolved via Eureka + "lb://user-service" instead of a hardcoded host:port.
user-service:
  url: http://localhost:8081
