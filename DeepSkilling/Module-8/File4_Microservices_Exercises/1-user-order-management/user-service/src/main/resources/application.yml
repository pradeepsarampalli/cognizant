server:
  port: 8081

spring:
  application:
    name: user-service

  # --- Default: in-memory H2 so the service is runnable immediately ---
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # --- To use MySQL/PostgreSQL instead, comment out the H2 block above and
  #     uncomment/adjust one of these: ---
  # datasource:
  #   url: jdbc:mysql://localhost:3306/userdb
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver
